name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build httpx pytest

      - name: Run sensitive-content gate
        run: python scripts/check_sensitive_content.py --all-history

      - name: Run repo harness gate
        run: python scripts/check_harness.py

      - name: Run tests
        run: python -m pytest -q

      - name: Build distribution artifacts
        run: python -m build
