name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: Lint (ruff + pre-commit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # Drift protection across interpreters. A Nautobot-version matrix and a
        # live docker-compose Nautobot run are tracked in the parity/gitops plan
        # (B3 full / B4) and added once the dev image lands.
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build httpx pytest
          python -m pip install .

      - name: Run sensitive-content gate
        run: python scripts/check_sensitive_content.py --all-history

      - name: Run repo harness gate
        run: python scripts/check_harness.py

      - name: Run release-state gate
        run: python scripts/check_release_state.py

      - name: Run query contract gate
        run: python scripts/check_query_contracts.py

      - name: Run release-helper unit tests
        run: python -m unittest discover -s scripts/tests -p 'test_*.py'

      - name: Generate contract diff report
        run: python scripts/generate_contract_diff_report.py --baseline-ref HEAD~1 --output dist/contract-diff-report.json

      - name: Run tests
        run: python -m pytest -q -m "not integration"

      - name: Build distribution artifacts
        run: python -m build

      - name: Verify wheel contents
        run: python scripts/check_wheel_contents.py

      - name: Upload contract diff report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: contract-diff-report
          path: dist/contract-diff-report.json
